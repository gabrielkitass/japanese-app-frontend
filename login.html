<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — にほんごアプリ</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="日本語">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="css/common.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-box { width: 100%; max-width: 400px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon { font-size: 3rem; display: block; margin-bottom: 8px; }
    .logo-title { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
    .tabs { display: flex; margin-bottom: 24px; border-bottom: 2px solid var(--border); }
    .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-weight: 600;
           color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 14px; border: 2px solid var(--border); border-radius: 8px;
                        font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: var(--primary); }
    .submit-btn { width: 100%; padding: 14px; font-size: 1rem; margin-top: 8px; }
    .lang-bar { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
    .divider { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin: 16px 0; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="lang-bar">
      <button class="lang-btn active" onclick="switchLang('ja', this)">日本語</button>
      <button class="lang-btn" onclick="switchLang('en', this)">English</button>
      <button class="lang-btn" onclick="switchLang('pt', this)">Português</button>
    </div>

    <div class="logo">
      <span class="logo-icon">🎌</span>
      <div class="logo-title" data-i18n="app_name">にほんごアプリ</div>
    </div>

    <div class="card">
      <div class="tabs">
        <div class="tab active" onclick="showTab('login', this)" data-i18n="login">ログイン</div>
        <div class="tab" onclick="showTab('register', this)">新規登録</div>
      </div>

      <!-- ログイン -->
      <div id="tab-login">
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" id="login-email" placeholder="teacher@example.com">
        </div>
        <div class="form-group">
          <label>パスワード</label>
          <input type="password" id="login-password" placeholder="••••••" onkeypress="if(event.key==='Enter') doLogin()">
        </div>
        <div id="login-error" style="display:none;" class="error-msg" style="margin-bottom:12px;"></div>
        <button class="btn btn-primary submit-btn" onclick="doLogin()" id="login-btn">
          <span data-i18n="login">ログイン</span>
        </button>
      </div>

      <!-- 新規登録（先生のみ） -->
      <div id="tab-register" style="display:none;">
        <div class="form-group">
          <label>お名前</label>
          <input type="text" id="reg-name" placeholder="山田 花子">
        </div>
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" id="reg-email" placeholder="teacher@example.com">
        </div>
        <div class="form-group">
          <label>パスワード（6文字以上）</label>
          <input type="password" id="reg-password" placeholder="••••••" onkeypress="if(event.key==='Enter') doRegister()">
        </div>
        <div id="reg-error" style="display:none;" class="error-msg" style="margin-bottom:12px;"></div>
        <button class="btn btn-primary submit-btn" onclick="doRegister()" id="reg-btn">
          先生として登録
        </button>
        <div class="divider">生徒のアカウントは先生が作成します</div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.error('SW registration failed:', err));
      });
    }
  </script>
  <script>
    I18n.init();

    // すでにログイン済みならリダイレクト
    if (Auth.isLoggedIn()) {
      const user = Auth.getUser();
      window.location.href = user?.role === 'teacher' ? '/teacher.html' : '/student.html';
    }

    function showTab(name, el) {
      document.getElementById('tab-login').style.display = name === 'login' ? 'block' : 'none';
      document.getElementById('tab-register').style.display = name === 'register' ? 'block' : 'none';
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }

    function switchLang(lang, btn) {
      I18n.load(lang);
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = `<span class="loading-spinner"></span>`;
      try {
        const user = await Auth.login(email, password);
        window.location.href = user.role === 'teacher' ? '/teacher.html' : '/student.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = `<span data-i18n="login">ログイン</span>`;
      }
    }

    async function doRegister() {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const errEl = document.getElementById('reg-error');
      const btn = document.getElementById('reg-btn');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = `<span class="loading-spinner"></span>`;
      try {
        await Auth.register(name, email, password);
        window.location.href = '/teacher.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '先生として登録';
      }
    }
  </script>
</body>
</html>
