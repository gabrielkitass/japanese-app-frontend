<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>にほんごアプリ</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/student.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="日本語">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>

  <!-- 言語選択画面 -->
  <div id="lang-screen" class="lang-select-screen">
    <div class="app-logo">🎌</div>
    <h1>にほんごアプリ<br><span style="font-size:0.7em; color:var(--text-muted);">Japanese Learning App</span></h1>
    <div class="lang-options">
      <button class="lang-option-btn" onclick="selectLang('ja')">
        <span class="flag">🇯🇵</span> 日本語
      </button>
      <button class="lang-option-btn" onclick="selectLang('en')">
        <span class="flag">🇺🇸</span> English
      </button>
      <button class="lang-option-btn" onclick="selectLang('pt')">
        <span class="flag">🇧🇷</span> Português (Brasil)
      </button>
    </div>
  </div>

  <!-- メインアプリ -->
  <div id="main-app" class="student-app" style="display:none;">

    <header class="student-header">
      <div>
        <div style="font-weight:700; font-size:1rem;" data-i18n="app_name">にほんごアプリ</div>
        <div class="streak">🔥 <span id="streak-count">0</span> <span data-i18n="days">日</span></div>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span class="xp-badge">⭐ <span id="xp-count">0</span> XP</span>
        <button class="lang-btn active" style="font-size:0.75rem; padding:4px 10px;" id="lang-indicator" onclick="showLangMenu()">🌐</button>
      </div>
    </header>

    <div class="student-content" id="tab-content">
      <!-- タブコンテンツが動的に挿入される -->
    </div>

    <section id="tab-flashcard" class="student-content" hidden>
      <!-- セットアップ画面 -->
      <div id="fc-setup">
        <div class="fc-controls">
          <select id="fc-level">
            <option value="n5">N5</option>
            <option value="n4">N4</option>
            <option value="n3">N3</option>
          </select>
          <select id="fc-category"></select>
          <select id="fc-mode">
            <option value="all" data-i18n="fc_mode_all">全部</option>
            <option value="review" data-i18n="fc_mode_review">復習</option>
            <option value="new" data-i18n="fc_mode_new">新しい</option>
          </select>
          <button id="fc-start" class="btn btn-primary" data-i18n="tab_flashcard">単語カードを始める</button>
        </div>
      </div>

      <!-- セッション画面 -->
      <div id="fc-session" hidden>
        <div class="fc-progress">
          <span id="fc-count">0 / 0</span>
          <div class="progress-bar"><div id="fc-bar" style="width:0%"></div></div>
        </div>
        <div class="fc-card-area">
          <div class="fc-card" id="fc-card">
            <div class="fc-card-inner">
              <div class="fc-card-front">
                <div class="fc-japanese" id="fc-japanese"></div>
                <div class="fc-reading" id="fc-reading"></div>
                <div style="color:var(--text-muted); font-size:0.8rem; margin-top:16px;">タップで答えを見る</div>
              </div>
              <div class="fc-card-back">
                <div class="fc-meaning" id="fc-meaning"></div>
                <div class="fc-example" id="fc-example" style="font-size:0.85rem; color:var(--text-muted); margin-top:8px;"></div>
              </div>
            </div>
          </div>
          <div class="fc-actions" id="fc-actions" hidden>
            <button class="btn btn-danger" id="fc-wrong" data-i18n="fc_wrong">わからない</button>
            <button class="btn btn-success" id="fc-correct" data-i18n="fc_correct">わかった！</button>
          </div>
        </div>
      </div>

      <!-- 結果画面 -->
      <div id="fc-results" hidden>
        <div class="fc-result-card">
          <h2 data-i18n="fc_session_done">セッション完了！</h2>
          <div class="fc-score" id="fc-result-score"></div>
          <div id="fc-result-detail"></div>
          <button class="btn btn-primary" onclick="document.getElementById('fc-setup').hidden=false;document.getElementById('fc-results').hidden=true;">もう一度</button>
        </div>
      </div>
    </section>

    <nav class="student-nav">
      <button class="active" onclick="switchTab('homework', this)">
        <span class="nav-icon">📝</span>
        <span data-i18n="homework">宿題</span>
      </button>
      <button onclick="switchTab('flashcard', this)">
        <span class="nav-icon">🃏</span>
        <span data-i18n="vocabulary">単語</span>
      </button>
      <button onclick="switchTab('chat', this)">
        <span class="nav-icon">🤖</span>
        <span data-i18n="ask_ai">AI</span>
      </button>
      <button onclick="switchTab('progress', this)">
        <span class="nav-icon">📈</span>
        <span data-i18n="progress">進捗</span>
      </button>
      <button onclick="switchTab('settings', this)">
        <span class="nav-icon">⚙️</span>
        <span data-i18n="settings">設定</span>
      </button>
    </nav>
  </div>

  <link rel="manifest" href="manifest.json">
  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/tts.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/student.js"></script>
  <script src="js/flashcard.js"></script>
  <script src="js/onboarding.js"></script>
  <script src="js/pronunciation.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>
